<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("labgraph-theme");
          const theme =
            savedTheme === "dark" || savedTheme === "light"
              ? savedTheme
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";

          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <link id="app-favicon" rel="icon" type="image/png" href="/logo/labgraph-ligth.png" />
    <link rel="apple-touch-icon" href="/pwa/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="application-name" content="LabGraph" />
    <meta name="apple-mobile-web-app-title" content="LabGraph" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LabGraph</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
